<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 12 Project</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <h1>Lily's Quiz!</h1>
    <hr />
    <!-- Song Question -->
    <form id="song-form">
      <label>
        🎥 What is my favorite song?
        <select id="song-answer">
          <option value="song1">Cassio (Jungle)</option>
          <option value="song2">Now or Never (Kendrick Lamar)</option>
          <option value="song3">Human (The Killers)</option>
          <option value="song4">Walk Like an Egyptian (The Bangles)</option>
        </select>
      </label>
      <button type="submit">Check Song Answer</button>
    </form>
    <div id="song-result">
      <p id="song-text"></p>
    </div>
    <hr />

     <!-- Game Question -->
    <form id="game-form">
      <label>
        🎥 What is my favorite game?
        <select id="game-answer">
          <option value="game1">Animal Crossings</option>
          <option value="game2">NYT Connections</option>
          <option value="game3">Slither.io</option>
          <option value="game4">Among Us</option>
        </select>
      </label>
      <button type="submit">Check Game Answer</button>
    </form>
    <div id="game-result">
      <p id="game-text"></p>
    </div>
    <hr />
    <!-- Book Question -->
    <form id="book-form">
      <label>
        📖 What is my favorite book?
        <select id="book-answer">
          <option value="book1">Walden</option>
          <option value="book2">Being and Nothingness</option>
          <option value="book3">Tomorrow and Tomorrow and Tomorrow</option>
          <option value="book4">Of Mice and Men</option>
        </select>
      </label>
      <button type="submit">Check Book Answer</button>
    </form>
    <div id="book-result">
      <p id="book-text"></p>
    </div>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>
      
      //========================Song Question jQuery Code
      $("#song-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#song-answer");
        var answer = $answer.val();

        if (answer === "song3") {
          $("#song-text").text("YESSSS!");
        } 
        else {
          $("#song-text").text("So close!");
        }
      });

      //=======================Book Question jQuery Code
      $("#book-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#book-answer");
        var answer = $answer.val();

        if (answer === "book1") {
          $("#book-text").text("YESSSS!");
        } 
        else {
          $("#book-text").text("Try Again!");
        }
      });

      
      //=======================Game Question jQuery Code
      $("#game-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#game-answer");
        var answer = $answer.val();

        if (answer === "game4") {
          $("#game-text").text("YESSSS!");
        } 
        else {
          $("#game-text").text("Try Again!");
        }
      });
      
    </script>
  </body>

  <!--- Taken From Khan Academy HTML/JS: Making webpages interactive with jQuery-->
</html>
